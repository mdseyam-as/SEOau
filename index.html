<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Generator</title>
  
  <!-- CRITICAL: Prevent ALL caching -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

    tailwind.config = {

            brand: {
              green: '#00DC82',
              dark: '#0B0F19',
              gray: '#F3F4F6',
              purple: '#7928CA',
              accent: '#FF0080',
            },
            glass: {
              100: 'rgba(255, 255, 255, 0.1)',
              200: 'rgba(255, 255, 255, 0.2)',
              300: 'rgba(255, 255, 255, 0.3)',
              dark: 'rgba(15, 23, 42, 0.6)',
            }
          },
          boxShadow: {
            'glow': '0 0 20px rgba(0, 220, 130, 0.5)',
            'glow-sm': '0 0 10px rgba(0, 220, 130, 0.3)',
            'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
          },
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "xlsx": "https://aistudiocdn.com/xlsx@^0.18.5",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
    "mammoth": "https://esm.sh/mammoth@1.8.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
  <style>
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .app-screen { min-height: 100vh; background: linear-gradient(135deg, #0B0F19 0%, #1a1f2e 50%, #0B0F19 100%); display: flex; align-items: center; justify-content: center; padding: 16px; font-family: system-ui, -apple-system, sans-serif; }
    .app-card { max-width: 400px; width: 100%; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(20px); border-radius: 16px; border: 1px solid rgba(71, 85, 105, 0.5); padding: 32px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    .app-icon { width: 80px; height: 80px; margin: 0 auto 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .app-btn { width: 100%; padding: 12px 24px; background: #00DC82; color: black; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .app-btn:hover { background: #00c974; }
    .app-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>

<body style="background: #0B0F19; margin: 0; padding: 0;">
  <!-- Loading screen - shown first -->
  <div id="loading-screen" class="app-screen">
    <div style="text-align: center;">
      <div style="width: 64px; height: 64px; margin: 0 auto 16px; position: relative;">
        <div style="position: absolute; inset: 0; background: rgba(0, 220, 130, 0.2); border-radius: 50%; animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;"></div>
        <div style="position: relative; width: 64px; height: 64px; background: #1e293b; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #334155;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#00DC82" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: pulse 2s ease-in-out infinite;">
            <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" x2="12.01" y1="20" y2="20"/>
          </svg>
        </div>
      </div>
      <h2 style="color: white; font-size: 20px; font-weight: bold; margin: 0 0 8px;">Подключение к серверу</h2>
      <p style="color: #94a3b8; font-size: 14px; margin: 0;">Пожалуйста, подождите...</p>
    </div>
  </div>

  <!-- Server offline screen - hidden by default -->
  <div id="server-offline" class="app-screen" style="display: none;">
    <div class="app-card">
      <div class="app-icon" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
        </svg>
      </div>
      <h1 style="color: white; font-size: 24px; font-weight: bold; margin: 0 0 8px;">Сервер недоступен</h1>
      <p style="color: #94a3b8; margin: 0 0 24px; font-size: 14px; line-height: 1.5;">
        Не удалось подключиться к серверу.<br>Возможно, ведутся технические работы.
      </p>
      <button id="retry-btn" onclick="retryConnection()" class="app-btn">
        <svg id="retry-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        </svg>
        <span id="retry-text">Повторить попытку</span>
      </button>
      <p id="retry-count" style="margin-top: 12px; font-size: 12px; color: #64748b; display: none;"></p>
      <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(71, 85, 105, 0.5);">
        <div style="display: flex; align-items: center; justify-content: center; gap: 8px; color: #64748b; font-size: 12px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" x2="23" y1="1" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><line x1="12" x2="12.01" y1="20" y2="20"/></svg>
          <span>Нет соединения с сервером</span>
        </div>
      </div>
    </div>
  </div>

  <!-- React app root - hidden until server check passes -->
  <div id="root" style="display: none;"></div>
  
  <script>
    // CRITICAL: Server health check runs BEFORE any React code
    // This blocks the app when server is down, even from Telegram cache
    
    var retryAttempts = 0;
    var isChecking = false;
    
    function showScreen(screenId) {
      document.getElementById('loading-screen').style.display = screenId === 'loading' ? 'flex' : 'none';
      document.getElementById('server-offline').style.display = screenId === 'offline' ? 'flex' : 'none';
      document.getElementById('root').style.display = screenId === 'app' ? 'block' : 'none';
    }
    
    function setRetryLoading(loading) {
      var btn = document.getElementById('retry-btn');
      var icon = document.getElementById('retry-icon');
      var text = document.getElementById('retry-text');
      btn.disabled = loading;
      icon.style.animation = loading ? 'spin 1s linear infinite' : 'none';
      text.textContent = loading ? 'Проверка...' : 'Повторить попытку';
    }
    
    async function checkServer() {
      try {
        var controller = new AbortController();
        var timeoutId = setTimeout(function() { controller.abort(); }, 5000);
        
        // Use timestamp to bypass ALL caches
        var response = await fetch('/health?t=' + Date.now() + '&r=' + Math.random(), {
          method: 'GET',
          signal: controller.signal,
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache' }
        });
        
        clearTimeout(timeoutId);
        return response.ok;
      } catch (e) {
        console.error('Health check failed:', e);
        return false;
      }
    }
    
    async function loadApp() {
      showScreen('loading');
      
      var isOnline = await checkServer();
      
      if (isOnline) {
        showScreen('app');
        // Load React app only after server check passes
        if (!window.__appLoaded) {
          var script = document.createElement('script');
          script.type = 'module';
          script.src = '/index.tsx?v=' + Date.now(); // Cache bust
          document.body.appendChild(script);
          window.__appLoaded = true;
        }
      } else {
        showScreen('offline');
      }
    }
    
    async function retryConnection() {
      if (isChecking) return;
      isChecking = true;
      setRetryLoading(true);
      retryAttempts++;
      
      var isOnline = await checkServer();
      
      if (isOnline) {
        // Server is back - reload page to get fresh state
        window.location.reload();
      } else {
        setRetryLoading(false);
        isChecking = false;
        if (retryAttempts > 2) {
          document.getElementById('retry-count').style.display = 'block';
          document.getElementById('retry-count').textContent = 'Попыток: ' + retryAttempts + '. Попробуйте позже.';
        }
      }
    }
    
    // Start check immediately
    loadApp();
  </script>
</body>

</html>
