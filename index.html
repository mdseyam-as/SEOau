      theme: {
        extend: {
          colors: {
            brand: {
              green: '#00DC82',
              dark: '#0B0F19',
              gray: '#F3F4F6',
              purple: '#7928CA',
              accent: '#FF0080',

            glass: {

            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',

          keyframes: {

              '0%, 100%': { transform: 'translateY(0)' },

                'background-position': 'right center'
              },
            },
          }
        }
      }
