<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO Generator</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0F19; font-family: system-ui, -apple-system, sans-serif; }
    .screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; background: linear-gradient(135deg, #0B0F19 0%, #1a1f2e 50%, #0B0F19 100%); }
    .card { max-width: 400px; width: 100%; background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(20px); border-radius: 16px; border: 1px solid rgba(71, 85, 105, 0.5); padding: 32px; text-align: center; }
    .icon { width: 80px; height: 80px; margin: 0 auto 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .icon-loading { background: rgba(0, 220, 130, 0.1); border: 1px solid rgba(0, 220, 130, 0.3); }
    .icon-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
    .btn { width: 100%; padding: 14px 24px; background: #00DC82; color: #000; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:disabled { opacity: 0.6; cursor: wait; }
    h1 { color: #fff; font-size: 22px; margin-bottom: 8px; }
    p { color: #94a3b8; font-size: 14px; line-height: 1.5; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    .spin { animation: spin 1s linear infinite; }
    #app-root { display: none; }
  </style>
</head>
<body>
  <!-- LOADING SCREEN -->
  <div id="screen-loading" class="screen">
    <div class="card">
      <div class="icon icon-loading">
        <svg class="pulse" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00DC82" stroke-width="2">
          <path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><circle cx="12" cy="20" r="1"/>
        </svg>
      </div>
      <h1>Подключение к серверу</h1>
      <p>Пожалуйста, подождите...</p>
    </div>
  </div>

  <!-- OFFLINE SCREEN -->
  <div id="screen-offline" class="screen" style="display:none;">
    <div class="card">
      <div class="icon icon-error">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2">
          <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
        </svg>
      </div>
      <h1>Сервер недоступен</h1>
      <p style="margin-bottom:24px;">Не удалось подключиться к серверу.<br>Возможно, ведутся технические работы.</p>
      <button id="btn-retry" class="btn" onclick="checkAndLoad()">
        <svg id="icon-retry" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/>
        </svg>
        <span id="btn-text">Повторить попытку</span>
      </button>
      <p id="retry-info" style="margin-top:16px;font-size:12px;color:#64748b;display:none;"></p>
    </div>
  </div>

  <!-- REACT APP (hidden until server check passes) -->
  <div id="app-root"></div>

  <script>
    // CRITICAL: Check server BEFORE loading any React code
    var retries = 0;
    var checking = false;

    function show(id) {
      document.getElementById('screen-loading').style.display = id === 'loading' ? 'flex' : 'none';
      document.getElementById('screen-offline').style.display = id === 'offline' ? 'flex' : 'none';
      document.getElementById('app-root').style.display = id === 'app' ? 'block' : 'none';
    }

    function setLoading(on) {
      document.getElementById('btn-retry').disabled = on;
      document.getElementById('icon-retry').classList.toggle('spin', on);
      document.getElementById('btn-text').textContent = on ? 'Проверка...' : 'Повторить попытку';
    }

    async function checkServer() {
      try {
        var ctrl = new AbortController();
        setTimeout(function() { ctrl.abort(); }, 5000);
        var r = await fetch('/health?_=' + Date.now(), { signal: ctrl.signal, cache: 'no-store' });
        return r.ok;
      } catch(e) {
        return false;
      }
    }

    async function checkAndLoad() {
      if (checking) return;
      checking = true;
      setLoading(true);
      retries++;

      var online = await checkServer();

      if (online) {
        show('app');
        // Load React app
        if (!window.__loaded) {
          window.__loaded = true;
          // Load Tailwind
          var tw = document.createElement('script');
          tw.src = 'https://cdn.tailwindcss.com';
          document.head.appendChild(tw);
          
          // Load importmap and React
          var im = document.createElement('script');
          im.type = 'importmap';
          im.textContent = JSON.stringify({
            imports: {
              "react/": "https://aistudiocdn.com/react@^19.2.0/",
              "react": "https://aistudiocdn.com/react@^19.2.0",
              "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
              "xlsx": "https://aistudiocdn.com/xlsx@^0.18.5",
              "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
              "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
              "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
              "mammoth": "https://esm.sh/mammoth@1.8.0"
            }
          });
          document.head.appendChild(im);
          
          // Load CSS
          var css = document.createElement('link');
          css.rel = 'stylesheet';
          css.href = '/index.css';
          document.head.appendChild(css);
          
          // Load app script
          setTimeout(function() {
            var s = document.createElement('script');
            s.type = 'module';
            s.src = '/index.tsx?v=' + Date.now();
            document.body.appendChild(s);
          }, 100);
        }
      } else {
        show('offline');
        if (retries > 2) {
          document.getElementById('retry-info').style.display = 'block';
          document.getElementById('retry-info').textContent = 'Попыток: ' + retries + '. Сервер не отвечает.';
        }
      }
      
      checking = false;
      setLoading(false);
    }

    // Start check immediately
    checkAndLoad();
  </script>
</body>
</html>
