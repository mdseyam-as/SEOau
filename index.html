  <style>
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>

  <div id="root" style="display: none;"></div>
  
  <script>
    // Check server health BEFORE loading React app
    // This prevents cached app from working when server is down
    async function checkServerAndLoad() {
      const loadingScreen = document.getElementById('loading-screen');
      const offlineScreen = document.getElementById('server-offline');
      const root = document.getElementById('root');
      
      // Show loading
      loadingScreen.style.display = 'flex';
      offlineScreen.style.display = 'none';
      root.style.display = 'none';
      
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        
        // Add cache-busting parameter
        const response = await fetch('/health?_=' + Date.now(), {
          method: 'GET',
          signal: controller.signal,
          cache: 'no-store',
          headers: {
            'Cache-Control': 'no-cache, no-store, must-revalidate',
            'Pragma': 'no-cache'
          }
        });
        
        clearTimeout(timeoutId);
        
        if (response.ok) {
          // Server is online - load React app
          loadingScreen.style.display = 'none';
          offlineScreen.style.display = 'none';
          root.style.display = 'block';
          
          // Load React app dynamically
          if (!window.__reactLoaded) {
            const script = document.createElement('script');
            script.type = 'module';
            script.src = '/index.tsx';
            document.body.appendChild(script);
            window.__reactLoaded = true;
          }
        } else {
          throw new Error('Server returned ' + response.status);
        }
      } catch (err) {
        console.error('Server health check failed:', err);
        // Server is offline - show offline screen
        loadingScreen.style.display = 'none';
        offlineScreen.style.display = 'flex';
        root.style.display = 'none';
      }
    }
    
    // Run check on page load
    checkServerAndLoad();
  </script>
